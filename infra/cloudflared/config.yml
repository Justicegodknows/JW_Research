# Cloudflare Tunnel routes. Replace <domain> with your real domain.
# Each hostname must also have a DNS CNAME pointing to <tunnel-id>.cfargotunnel.com.

tunnel: jw-research
credentials-file: /etc/cloudflared/jw-research.json

ingress:
  - hostname: qdrant.<domain>
    service: http://qdrant:6333
  - hostname: llm.<domain>
    service: http://vllm:8000
  - hostname: embed.<domain>
    service: http://embed:8001
  - service: http_status:404
